<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TTS - STT</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #fff;
            color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 48px 16px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 10px 12px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #ccc;
            border-radius: 6px;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #888;
        }

        button {
            align-self: flex-start;
            padding: 8px 20px;
            font-size: 15px;
            font-family: inherit;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <textarea id="text" readonly></textarea>
        <button onclick="onSpeak()">Speak</button>
    </div>

    <div class="container">
        <textarea id="tts-input" placeholder="Enter text to read…">Hello, how are you?</textarea>
        <button onclick="onTranscriptUserInput()">Read loudly</button>
    </div>

    <script>
        function onTranscriptUserInput() {
            const text = document.getElementById('tts-input').value;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "en-US";
            speechSynthesis.speak(u);
        }

        function onSpeak() {
            const r = new SpeechRecognition();
            r.onresult = (event) => {
                console.log('event:', event);
                document.getElementById('text').value = event.results[0][0].transcript;
            };
            r.start();
        }
    </script>
</body>

</html>
